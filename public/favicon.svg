<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Qu'est-ce que je bois">
  <!-- Backdrop: warm dark navy matching site bg (oklch 0.16 0.012 60) -->
  <rect width="64" height="64" rx="14" fill="#1F1813"/>

  <!-- Subtle glow behind the glass -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#E5A961" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E5A961" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2C57A"/>
      <stop offset="100%" stop-color="#C97C3F"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="28" r="22" fill="url(#glow)"/>

  <!-- Liquid (gradient amber fill, slightly inset from rim) -->
  <path d="M19.5 21 L32 35.5 L44.5 21 Z" fill="url(#liquid)"/>

  <!-- Glass silhouette: rim line + V bowl + stem + base -->
  <g fill="none" stroke="#E5A961" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 18 L48 18"/>
    <path d="M16 18 L32 38 L48 18"/>
    <path d="M32 38 L32 50"/>
    <path d="M22 50 L42 50"/>
  </g>

  <!-- Olive on a pick -->
  <line x1="35" y1="12.5" x2="38" y2="20.5" stroke="#E5A961" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="38" cy="20.5" r="2.4" fill="#1F1813" stroke="#E5A961" stroke-width="1.5"/>
</svg>
